<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://*.twitch.tv;
                 script-src 'self' https://extension-files.twitch.tv;
                 style-src 'self' 'unsafe-inline';
                 frame-ancestors https://*.twitch.tv;">
  <link rel="stylesheet" href="src/css/config.css"/>
</head>
<body>
  <h1>Live Game Link 4 (UGS)</h1>
  <p>One-time setup. Paste your UGS project ID — the overlay needs it to fetch state on load.</p>
  <label>UGS Project ID <input id="project" size="36"/></label>
  <label>UGS Environment <input id="env" value="production" size="16"/></label>
  <label>Stateless service-account token <input id="token" type="password" size="48"/></label>
  <button id="save">Save</button>
  <div id="msg"></div>
  <p class="hint">Token is read-only: it can only call <code>TwitchBroadcast/GetState</code>. Generate from UGS Dashboard → Service Accounts → Create.</p>
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  <script src="src/config.js"></script>
</body>
</html>
